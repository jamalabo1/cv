name: Build and Export to PDF

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches:
      - staging
  workflow_dispatch:


permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.56.1-jammy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Prepare packages
        run: |
          npm ci --omit=dev
          npm install playwright@1.56.1

      - name: build
        run: npm run build

      - name: export (serve public + print to PDF)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out

          # sanity checks
          ls -la public

          # ensure python exists (Playwright image may not include it)
          if ! command -v python3 >/dev/null 2>&1; then
            apt-get update
            apt-get install -y python3
          fi

          # start server
          python3 -m http.server 4173 --bind 127.0.0.1 --directory public >/tmp/http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID" 2>/dev/null || true; echo "---- http.log ----"; tail -n 200 /tmp/http.log || true' EXIT

          # wait until ready
          for i in $(seq 1 60); do
            if curl -4 -sSf http://127.0.0.1:4173/ >/dev/null; then
              echo "server is up"
              break
            fi

            # if server crashed, show logs and fail early
            if ! kill -0 "$SERVER_PID" 2>/dev/null; then
              echo "server exited early"
              tail -n 200 /tmp/http.log || true
              exit 1
            fi

            sleep 1
          done
          
          export BASE_URL="http://localhost:4173"
          export OUTPUT_PATH="out/output.pdf"
          node export-pdf.js

          # cleanup
          kill "$SERVER_PID"

      - name: upload pdf resume
        uses: actions/upload-artifact@v4
        with:
          name: exported-resume
          path: out/output.pdf
          if-no-files-found: error
          retention-days: 90

      - name: create release
        if: github.event_name != 'pull_request'
        uses: ncipollo/release-action@v1
        with:
          artifacts: "out/output.pdf"
          name: "Resume ${{ github.ref_name }}"
          body: "pdf release of the cv"
          allowUpdates: true
